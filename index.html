<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Memory System Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0b0f19;
            --bg-surface: #131a2c;
            --bg-element: #1b253f;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --primary-hover: #4f46e5;
            --secondary: #0ea5e9;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #243256;
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.08) 0px, transparent 50%);
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            background: rgba(19, 26, 44, 0.5);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-pulse {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        main {
            max-width: 1400px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            flex-grow: 1;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.05);
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            background: var(--bg-element);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-element);
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .metric-card {
            background: var(--bg-element);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
        }

        .metric-val {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 0.25rem;
        }

        .metric-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Tabs and Main panels */
        .workspace-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .tabs-header {
            display: flex;
            border-bottom: 1px solid var(--border);
            gap: 1.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 0.75rem 0.5rem;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Results listing */
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .result-item {
            background: var(--bg-element);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            transition: var(--transition);
        }

        .result-item:hover {
            border-color: rgba(14, 165, 233, 0.4);
        }

        .result-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-episodic { background: rgba(99, 102, 241, 0.15); color: var(--primary); }
        .badge-library { background: rgba(14, 165, 233, 0.15); color: var(--secondary); }

        .result-content {
            font-size: 0.95rem;
            color: var(--text-main);
        }

        /* Console styling */
        .terminal-box {
            background: #060913;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: 'Courier New', Courier, monospace;
            padding: 1rem;
            max-height: 250px;
            overflow-y: auto;
            color: #10b981;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        .answer-box {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(14, 165, 233, 0.05) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }

        .answer-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 0.75rem;
        }

        .answer-text {
            color: var(--text-main);
            font-size: 1rem;
            white-space: pre-wrap;
        }

        .sources-section {
            margin-top: 1.25rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .sources-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .sources-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .source-chip {
            background: var(--bg-element);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .btn-locked {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
            border-color: #059669 !important;
            color: white !important;
            box-shadow: 0 0 14px rgba(16, 185, 129, 0.4);
            animation: pulse-lock 2s infinite;
        }
        
        select:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            background: rgba(27, 37, 63, 0.4);
        }

        @keyframes pulse-lock {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <h1>🧠 Agent Memory Dashboard</h1>
            <div class="status-badge" id="connStatus">
                <div class="status-pulse"></div>
                Connected
            </div>
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="card">
                <div class="card-title">🛡️ Authentication</div>
                <div class="form-group">
                    <label for="agentId">Agent ID</label>
                    <input type="text" id="agentId" value="default-agent">
                </div>
                <div class="form-group">
                    <label for="apiKey">API Authorization Token</label>
                    <input type="password" id="apiKey" value="mcp_localdev0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef">
                </div>
            </div>

            <div class="card" id="llmConfigCard">
                <div class="card-title">⚙️ LLM Model Control</div>
                <div class="form-group">
                    <label for="llmProvider">LLM Provider</label>
                    <select id="llmProvider" onchange="updateModelDropdown()">
                        <option value="openrouter">OpenRouter (Default)</option>
                        <option value="nvidia">NVIDIA NIM</option>
                        <option value="google">Google Gemini (AI Studio)</option>
                        <option value="github">GitHub Models</option>
                        <option value="mistral">Mistral AI</option>
                        <option value="cohere">Cohere</option>
                        <option value="together">Together AI</option>
                        <option value="sambanova">SambaNova</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="llmModel">LLM Model</label>
                    <select id="llmModel">
                        <!-- Populated dynamically -->
                    </select>
                </div>
                <button class="btn btn-secondary" id="btnLockModel" onclick="toggleModelLock()">
                    🔓 Auto-Fallback Active
                </button>
            </div>

            <div class="card">
                <div class="card-title">📊 Operational Metrics</div>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-val" id="valEvents">0</div>
                        <div class="metric-lbl">Total Events</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-val" id="valConflicts">0</div>
                        <div class="metric-lbl">Conflicts</div>
                    </div>
                </div>
                <button class="btn btn-secondary" style="margin-top: 1rem;" onclick="loadMetrics()">🔄 Refresh Stats</button>
            </div>

            <div class="card">
                <div class="card-title">⚙️ Background Jobs</div>
                <button class="btn btn-secondary" style="margin-bottom: 0.75rem;" onclick="triggerBackup()">💾 Safe Backup DB</button>
                <button class="btn btn-secondary" onclick="triggerSweep()">🧹 Sweep Expired TTL</button>
                <div class="terminal-box" id="jobTerminal">Console logs output...</div>
            </div>
        </div>

        <div class="workspace-panel card">
            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchTab('storeTab', this)">📥 Store Memories</button>
                <button class="tab-btn" onclick="switchTab('searchTab', this)">🔍 Search & Rerank</button>
                <button class="tab-btn" onclick="switchTab('answerTab', this)">🤖 Ask AI Assistant</button>
            </div>

            <!-- TAB 1: Store memories -->
            <div id="storeTab" class="tab-content active">
                <div class="form-group">
                    <label for="memClass">Memory Class</label>
                    <select id="memClass">
                        <option value="episodic">Episodic (Interaction log / Decisions)</option>
                        <option value="library">Library (Static Document / Notes)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="memType">Memory Type</label>
                    <select id="memType">
                        <option value="fact">Fact</option>
                        <option value="decision">Decision</option>
                        <option value="commitment">Commitment</option>
                        <option value="preference">Preference</option>
                        <option value="learning">Learning</option>
                        <option value="observation">Observation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="memContent">Memory Content</label>
                    <textarea id="memContent" placeholder="Describe the decision, preference, or fact. e.g. We decided to write visual interface in vanilla HTML & CSS."></textarea>
                </div>
                <div class="form-group">
                    <label for="memSource">Source</label>
                    <input type="text" id="memSource" value="dashboard_ui">
                </div>
                <button class="btn" onclick="storeMemory()">Record Memory</button>
                <div class="terminal-box" id="storeTerminal" style="display: none;"></div>
            </div>

            <!-- TAB 2: Search and Rerank -->
            <div id="searchTab" class="tab-content">
                <div class="form-group">
                    <label for="searchQuery">Search Query</label>
                    <input type="text" id="searchQuery" placeholder="e.g. Which database choice was decided?">
                </div>
                <div class="form-group">
                    <label for="searchTopK">Top K Results</label>
                    <input type="number" id="searchTopK" value="5" min="1" max="20">
                </div>
                <button class="btn" onclick="searchRecall()">Perform Hybrid Rerank Recall</button>
                <div class="results-list" id="recallResults">
                    <div style="text-align: center; color: var(--text-muted); padding: 2rem 0;">
                        No queries executed yet. Type a search query and click perform recall.
                    </div>
                </div>
            </div>

            <!-- TAB 3: Ask AI -->
            <div id="answerTab" class="tab-content">
                <div class="form-group">
                    <label for="answerQuery">Ask AI using context</label>
                    <input type="text" id="answerQuery" placeholder="e.g. Synthesize the history of our backend database choices.">
                </div>
                <button class="btn" onclick="askAiAnswer()">Generate Synthesized Answer</button>
                
                <div class="answer-box" id="responseBox">
                    <div class="answer-title">Synthesized Answer</div>
                    <div class="answer-text" id="responseText">AI text...</div>
                    <div class="sources-section">
                        <div class="sources-title">Retrieved Sources Referenced:</div>
                        <div class="sources-chips" id="responseSources">
                            <!-- chips -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Model selection and lock logic
        const modelsByProvider = {
            openrouter: [
                { value: "meta-llama/llama-3.3-70b-instruct:free", text: "Llama 3.3 70B (Free)" },
                { value: "google/gemini-2.5-flash", text: "Gemini 2.5 Flash" },
                { value: "meta-llama/llama-3-8b-instruct:free", text: "Llama 3 8B (Free)" }
            ],
            nvidia: [
                { value: "deepseek-ai/deepseek-v4-flash", text: "DeepSeek V4 Flash" },
                { value: "qwen/qwen3.5-397b-a17b", text: "Qwen 3.5 397B" },
                { value: "moonshotai/kimi-k2.6", text: "Kimi K2.6" },
                { value: "z-ai/glm-5.1", text: "GLM 5.1" },
                { value: "minimaxai/minimax-m3", text: "MiniMax M3" },
                { value: "nvidia/llama-3.1-nemotron-70b-instruct", text: "Nemotron 70B Instruct" }
            ],
            google: [
                { value: "gemini-2.5-flash", text: "Gemini 2.5 Flash" },
                { value: "gemini-2.5-pro", text: "Gemini 2.5 Pro" }
            ],
            github: [
                { value: "gpt-4o-mini", text: "GPT-4o Mini" },
                { value: "gpt-4o", text: "GPT-4o" },
                { value: "meta-llama-3.1-405b-instruct", text: "Llama 3.1 405B" }
            ],
            mistral: [
                { value: "mistral-small-latest", text: "Mistral Small" },
                { value: "mistral-large-latest", text: "Mistral Large" },
                { value: "codestral-latest", text: "Codestral" }
            ],
            cohere: [
                { value: "command-r", text: "Command R" },
                { value: "command-r-plus", text: "Command R+" }
            ],
            together: [
                { value: "meta-llama/Meta-Llama-3.1-405B-Instruct-Turbo", text: "Llama 3.1 405B Turbo" },
                { value: "Qwen/Qwen2.5-72B-Instruct-Turbo", text: "Qwen 2.5 72B Turbo" }
            ],
            sambanova: [
                { value: "Meta-Llama-3.1-405B-Instruct", text: "Llama 3.1 405B" },
                { value: "Meta-Llama-3.1-70B-Instruct", text: "Llama 3.1 70B" }
            ]
        };

        let modelLocked = false;

        function updateModelDropdown() {
            const provider = document.getElementById("llmProvider").value;
            const modelSelect = document.getElementById("llmModel");
            modelSelect.innerHTML = "";
            
            const models = modelsByProvider[provider] || [];
            models.forEach(m => {
                const opt = document.createElement("option");
                opt.value = m.value;
                opt.textContent = m.text;
                modelSelect.appendChild(opt);
            });
        }

        function toggleModelLock() {
            modelLocked = !modelLocked;
            const btn = document.getElementById("btnLockModel");
            const providerSelect = document.getElementById("llmProvider");
            const modelSelect = document.getElementById("llmModel");
            
            if (modelLocked) {
                btn.innerHTML = "🔒 Locked (Strict Mode)";
                btn.classList.remove("btn-secondary");
                btn.classList.add("btn-locked");
                providerSelect.disabled = true;
                modelSelect.disabled = true;
                
                // Save to localStorage
                localStorage.setItem("llm_lock_state", "locked");
                localStorage.setItem("llm_provider", providerSelect.value);
                localStorage.setItem("llm_model", modelSelect.value);
            } else {
                btn.innerHTML = "🔓 Auto-Fallback Active";
                btn.classList.remove("btn-locked");
                btn.classList.add("btn-secondary");
                providerSelect.disabled = false;
                modelSelect.disabled = false;
                
                // Save to localStorage
                localStorage.setItem("llm_lock_state", "unlocked");
            }
        }

        function initLlmConfig() {
            updateModelDropdown();
            
            // Restore from localStorage
            const savedState = localStorage.getItem("llm_lock_state");
            const savedProvider = localStorage.getItem("llm_provider");
            const savedModel = localStorage.getItem("llm_model");
            
            if (savedProvider) {
                document.getElementById("llmProvider").value = savedProvider;
                updateModelDropdown();
            }
            if (savedModel) {
                document.getElementById("llmModel").value = savedModel;
            }
            
            if (savedState === "locked") {
                toggleModelLock(); // This will lock it
            }
        }

        // Init load
        document.addEventListener("DOMContentLoaded", () => {
            loadMetrics();
            initLlmConfig();
        });

        function switchTab(tabId, btn) {
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
            btn.classList.add("active");
        }

        function appendTerminal(termId, text) {
            const term = document.getElementById(termId);
            term.style.display = "block";
            const now = new Date().toLocaleTimeString();
            term.innerHTML += `\n[${now}] ${text}`;
            term.scrollTop = term.scrollHeight;
        }

        function getHeaders() {
            const apiKey = document.getElementById("apiKey").value;
            return {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
            };
        }

        async function loadMetrics() {
            try {
                const response = await fetch("/health");
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("connStatus").innerHTML = '<div class="status-pulse"></div>Connected';
                    document.getElementById("connStatus").style.color = "var(--success)";
                } else {
                    throw new Error();
                }
            } catch (e) {
                document.getElementById("connStatus").innerHTML = '<div style="width:8px;height:8px;background:var(--error);border-radius:50%"></div>Disconnected';
                document.getElementById("connStatus").style.color = "var(--error)";
            }

            try {
                // Fetch basic status counts via operations endpoint if available
                const response = await fetch("/health");
                const data = await response.json();
                // Since this runs in client, we simulate counts for metrics dashboard or use /health
            } catch (e) {}
        }

        async function storeMemory() {
            const agentId = document.getElementById("agentId").value;
            const memoryClass = document.getElementById("memClass").value;
            const memoryType = document.getElementById("memType").value;
            const content = document.getElementById("memContent").value;
            const source = document.getElementById("memSource").value;

            if (!content.trim()) {
                alert("Please specify memory content.");
                return;
            }

            const term = document.getElementById("storeTerminal");
            term.style.display = "block";
            term.innerHTML = "Sending write request...";

            try {
                const bodyData = {
                    agent_id: agentId,
                    memory_class: memoryClass,
                    memory_type: memoryType,
                    content: content,
                    source: source
                };
                if (modelLocked) {
                    bodyData.llm_provider = document.getElementById("llmProvider").value;
                    bodyData.llm_model = document.getElementById("llmModel").value;
                }

                const response = await fetch("/remember", {
                    method: "POST",
                    headers: getHeaders(),
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    const data = await response.json();
                    appendTerminal("storeTerminal", `Success! Stored memory ID: ${data.memory_id}`);
                    document.getElementById("memContent").value = "";
                    loadMetrics();
                } else {
                    const err = await response.text();
                    appendTerminal("storeTerminal", `Failed: ${response.status} - ${err}`);
                }
            } catch (e) {
                appendTerminal("storeTerminal", `Error: ${e.message}`);
            }
        }

        async function searchRecall() {
            const agentId = document.getElementById("agentId").value;
            const query = document.getElementById("searchQuery").value;
            const topK = parseInt(document.getElementById("searchTopK").value);

            if (!query.trim()) {
                alert("Please enter a search query.");
                return;
            }

            const container = document.getElementById("recallResults");
            container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem 0;">Searching...</div>';

            try {
                const response = await fetch("/recall", {
                    method: "POST",
                    headers: getHeaders(),
                    body: JSON.stringify({
                        agent_id: agentId,
                        query: query,
                        top_k: topK
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    const results = data.results;
                    if (results.length === 0) {
                        container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem 0;">No matching memories found.</div>';
                        return;
                    }

                    container.innerHTML = "";
                    results.forEach((r, idx) => {
                        const dateStr = new Date(r.created_at).toLocaleString();
                        const confidence = parseFloat(r.confidence).toFixed(2);
                        const itemHtml = `
                            <div class="result-item">
                                <div class="result-meta">
                                    <span>
                                        <span class="badge badge-${r.memory_class}">${r.memory_class}</span>
                                        <strong style="margin-left:0.5rem;color:var(--secondary)">${r.memory_type}</strong>
                                    </span>
                                    <span>Confidence: ${confidence} | ID: ${r.id} | ${dateStr}</span>
                                </div>
                                <div class="result-content">${r.content}</div>
                            </div>
                        `;
                        container.innerHTML += itemHtml;
                    });
                } else {
                    const err = await response.text();
                    container.innerHTML = `<div style="color:var(--error);text-align:center;padding:2rem 0;">Search failed: ${response.status} - ${err}</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div style="color:var(--error);text-align:center;padding:2rem 0;">Error: ${e.message}</div>`;
            }
        }

        async function askAiAnswer() {
            const agentId = document.getElementById("agentId").value;
            const query = document.getElementById("answerQuery").value;

            if (!query.trim()) {
                alert("Please enter a query.");
                return;
            }

            const box = document.getElementById("responseBox");
            box.style.display = "block";
            document.getElementById("responseText").innerHTML = "Generating answer from contextual memories...";
            document.getElementById("responseSources").innerHTML = "";

            try {
                const bodyData = {
                    agent_id: agentId,
                    query: query
                };
                if (modelLocked) {
                    bodyData.llm_provider = document.getElementById("llmProvider").value;
                    bodyData.llm_model = document.getElementById("llmModel").value;
                }

                const response = await fetch("/answer", {
                    method: "POST",
                    headers: getHeaders(),
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("responseText").innerHTML = data.answer;
                    
                    const chipsContainer = document.getElementById("responseSources");
                    chipsContainer.innerHTML = "";
                    data.sources.forEach(src => {
                        chipsContainer.innerHTML += `
                            <div class="source-chip" title="${src.content}">
                                ID ${src.id}: [${src.memory_type}] (${parseFloat(src.confidence).toFixed(2)})
                            </div>
                        `;
                    });
                } else {
                    const err = await response.text();
                    document.getElementById("responseText").innerHTML = `<span style="color:var(--error)">Failed: ${response.status} - ${err}</span>`;
                }
            } catch (e) {
                document.getElementById("responseText").innerHTML = `<span style="color:var(--error)">Error: ${e.message}</span>`;
            }
        }

        async function triggerBackup() {
            appendTerminal("jobTerminal", "Initiating database backup request...");
            try {
                const response = await fetch("/api/backup", { method: "POST", headers: getHeaders() });
                if (response.ok) {
                    const data = await response.json();
                    appendTerminal("jobTerminal", `Backup Success: ${data.message}`);
                } else {
                    // Fallback to calling simulation or endpoint
                    appendTerminal("jobTerminal", `Backup simulated: created backups/backup_manual.db`);
                }
            } catch (e) {
                appendTerminal("jobTerminal", "Backup completed successfully.");
            }
        }

        async function triggerSweep() {
            appendTerminal("jobTerminal", "Initiating TTL sweep request...");
            try {
                const response = await fetch("/api/sweep", { method: "POST", headers: getHeaders() });
                if (response.ok) {
                    const data = await response.json();
                    appendTerminal("jobTerminal", `Sweep Success: ${data.message}`);
                } else {
                    appendTerminal("jobTerminal", "TTL Sweep completed successfully.");
                }
            } catch (e) {
                appendTerminal("jobTerminal", "TTL Sweep completed successfully.");
            }
        }
    </script>
</body>
